#!/bin/bash
CONF_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd -P)"
RUN_DIR="$(cd "${CONF_DIR}/.." && pwd -P)"

: "${JOB_NAME:=system-production}"
: "${ACCOUNT:=your_account}"
: "${PARTITION:=your_partition}"
: "${CPUS:=8}"
: "${MEMORY:=4G}"
: "${WALLTIME:=08:00:00}"
: "${HEADNODE:=your_login_node}"

: "${MAXH:=7.0}"
: "${CPT_MIN:=15}"
: "${MAX_RESUB:=100}"
: "${SIGNAL_SECONDS:=900}"
: "${RESUBMIT_MODE:=RESUBMIT}"

: "${BLOCK_NS:=10}"
: "${DT_PS_DEFAULT:=0.002}"

: "${MAXWARN:=1000}"
: "${USE_POSRES_REF:=0}"
: "${GMX_MODE:=GPU}"

: "${USE_SCRATCH:=AUTO}"
: "${KEEP_SCRATCH:=0}"

: "${COMPRESS_DONE_BLOCKS:=1}"
: "${COMPRESS_LOG:=1}"
: "${COMPRESS_TPR:=1}"
: "${COMPRESS_XTC:=0}"
: "${COMPRESS_GRO:=0}"
: "${COMPRESS_EDR:=0}"
: "${COMPRESS_MDP:=0}"
: "${COMPRESS_LEVEL:=1}"

: "${SYS_NAME:=system-name}"
: "${START_CONF:=/initial/init6.gro}"
: "${MDP_TEMPLATE:=01_production.mdp}"
: "${TOP_FILE:=/boxmin/system-name.top}"
: "${INDEX_FILE:=/boxmin/index.ndx}"

: "${CONTAINER_IMAGE:?Set CONTAINER_IMAGE to your CpHMD / GROMACS .sif image.}"
: "${BOXMIN_DIR_HOST:?Set BOXMIN_DIR_HOST to the host path of your 01_box-min directory.}"
: "${INITIAL_DIR_HOST:?Set INITIAL_DIR_HOST to the host path of your 02_initial directory.}"
: "${FF_DIR_HOST:?Set FF_DIR_HOST to the host directory containing your force field.}"
: "${RUNTIME:=apptainer}"

if [[ "$MDP_TEMPLATE" = /* ]]; then
  MDP_TEMPLATE_PATH="$MDP_TEMPLATE"
else
  MDP_TEMPLATE_PATH="${RUN_DIR}/${MDP_TEMPLATE}"
fi

mdp_get_value() {
  local key="$1"
  local file="$2"
  awk -F= -v key="$key" '
    { sub(/;.*/, "", $0) }
    $1 ~ "^[[:space:]]*" key "[[:space:]]*$" {
      val=$2
      gsub(/^[[:space:]]+|[[:space:]]+$/, "", val)
      print val
      exit
    }
  ' "$file"
}

if [[ ! -f "$MDP_TEMPLATE_PATH" ]]; then
  echo "ERROR: MDP template not found while sourcing config: $MDP_TEMPLATE_PATH" >&2
  return 1 2>/dev/null || exit 1
fi

MDP_DT="$(mdp_get_value dt "$MDP_TEMPLATE_PATH")"
MDP_NSTEPS="$(mdp_get_value nsteps "$MDP_TEMPLATE_PATH")"

if [[ -z "$MDP_DT" ]]; then
  MDP_DT="$DT_PS_DEFAULT"
fi

if [[ -z "$MDP_NSTEPS" ]]; then
  echo "ERROR: could not parse nsteps from $MDP_TEMPLATE_PATH" >&2
  return 1 2>/dev/null || exit 1
fi

TOTAL_NS="$(awk -v dt="$MDP_DT" -v nsteps="$MDP_NSTEPS" 'BEGIN {printf "%.10g", (dt*nsteps)/1000.0}')"
DT_PS="$MDP_DT"

export JOB_NAME ACCOUNT PARTITION CPUS MEMORY WALLTIME HEADNODE
export MAXH CPT_MIN MAX_RESUB SIGNAL_SECONDS RESUBMIT_MODE
export BLOCK_NS DT_PS_DEFAULT TOTAL_NS DT_PS
export MAXWARN USE_POSRES_REF GMX_MODE
export USE_SCRATCH KEEP_SCRATCH
export COMPRESS_DONE_BLOCKS COMPRESS_LOG COMPRESS_TPR COMPRESS_XTC
export COMPRESS_GRO COMPRESS_EDR COMPRESS_MDP COMPRESS_LEVEL
export SYS_NAME START_CONF MDP_TEMPLATE TOP_FILE INDEX_FILE
export CONTAINER_IMAGE BOXMIN_DIR_HOST INITIAL_DIR_HOST FF_DIR_HOST RUNTIME
